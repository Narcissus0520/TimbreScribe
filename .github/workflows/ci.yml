name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Windows quality gates
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      PYTHONUTF8: "1"
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python 3.11
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"
          enable-cache: true

      - name: Synchronize locked environment
        run: uv sync --frozen --group dev

      - name: Install verified FFmpeg reference
        shell: pwsh
        run: ./tools/setup_ffmpeg.ps1 -Destination (Join-Path $env:RUNNER_TEMP "timbrescribe-ffmpeg")

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type-check
        run: uv run mypy src/timbrescribe

      - name: Validate generated MusicXML against W3C 4.0 XSD
        shell: pwsh
        run: ./tools/validate_musicxml_xsd.ps1 -CacheDirectory (Join-Path $env:RUNNER_TEMP "musicxml40-xsd")

      - name: Test model-free suite
        run: uv run pytest -m "not model and not packaging"
